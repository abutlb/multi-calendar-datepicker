name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Check dist is up to date with src
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::dist/ is stale — run 'npm run build' and commit the result"
            git diff --stat -- dist
            exit 1
          fi
