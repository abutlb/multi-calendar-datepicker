<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>اختيار نطاق — Range Selection</title>
  <link rel="stylesheet" href="../dist/multi-calendar-datepicker.css">
  <style>
    body {
      font-family: system-ui, sans-serif; background: #f3f4f6;
      margin: 0; padding: 40px; color: #111827;
    }
    .card {
      max-width: 480px; margin: auto; background: #fff;
      border-radius: 16px; padding: 28px; border: 1px solid #e5e7eb;
      box-shadow: 0 16px 40px rgba(0,0,0,.08);
    }
    h1 { font-size: 1.25rem; margin-top: 0; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color: #374151; }
    input {
      font: inherit; width: 100%; box-sizing: border-box;
      border: 1px solid #d1d5db; border-radius: 10px; padding: 11px 13px;
    }
    .out {
      margin-top: 16px; padding: 12px 14px; border-radius: 10px;
      background: #eff6ff; border: 1px solid #bfdbfe; font-size: .85rem;
      min-height: 20px; word-break: break-all;
    }
    .hint { color: #6b7280; font-size: .8rem; margin-top: 14px; }
  </style>
</head>
<body>
<div class="card">
  <h1>حجز من – إلى (هجري أم القرى)</h1>
  <label for="stay">فترة الحجز</label>
  <input id="stay" placeholder="اختر تاريخ البداية ثم النهاية" readonly autocomplete="off">
  <div class="out" id="out">لم يتم اختيار نطاق بعد.</div>
  <p class="hint">اضغط يوم البداية ثم يوم النهاية. الضغط على تاريخ أسبق من البداية يعكس الترتيب تلقائياً. القيمة الميلادية المخزنة تظهر بالأسفل بصيغة ISO interval.</p>
</div>

<script src="../dist/multi-calendar-datepicker.js"></script>
<script>
  const picker = new MultiCalendarDatepicker.Datepicker('#stay', {
    calendar:    'hijri',
    hijriMode:   'ummalqura',
    mode:        'range',
    locale:      'ar',
    dir:         'rtl',
    weekendDays: [5, 6],
    secondaryCalendar: 'gregorian',
  });

  document.getElementById('stay').addEventListener('mcd:change', e => {
    const d = e.detail;
    document.getElementById('out').innerHTML =
      'العرض: <b>' + d.displayValue + '</b><br>' +
      'قاعدة البيانات (ميلادي): <b>' + d.value + '</b>';
  });
</script>
</body>
</html>
